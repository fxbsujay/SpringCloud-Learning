server:
  port: 2001

spring:
  main:
    allow-circular-references: true
  application:
    name: seata-order-service
  cloud:
    nacos:
        discovery:
          server-addr: localhost:8848
    alibaba:
      seata:
        tx-service-group: susu_tx_group
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/seata_order?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.susu.springcloud.entitys